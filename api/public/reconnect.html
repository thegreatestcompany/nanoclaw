<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Otto by HNTIC — Reconnexion</title>
  <link rel="icon" href="/static/hntic-logo.png" type="image/png">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #fafafa;
      color: #1a1a1a;
      padding: 40px 20px;
    }

    .container { max-width: 440px; width: 100%; text-align: center; }
    .logo-img { width: 56px; height: 56px; margin-bottom: 32px; }
    h1 { font-size: 1.8rem; font-weight: 300; letter-spacing: 0.3em; text-transform: uppercase; margin-bottom: 4px; }
    .byline { font-size: 0.95rem; color: #999; font-style: italic; letter-spacing: 0.15em; margin-bottom: 40px; }
    .tagline { font-size: 1.1rem; color: #555; margin-bottom: 32px; font-weight: 300; }

    .card {
      background: #fff; padding: 28px 32px; border-radius: 16px;
      border: 1px solid #eee; margin-bottom: 24px;
    }
    .card label { display: block; text-align: left; font-size: 0.9rem; color: #555; margin-bottom: 8px; }
    .card input {
      width: 100%; padding: 12px 16px; border: 1px solid #ddd; border-radius: 8px;
      font-size: 1rem; font-family: inherit; outline: none; margin-bottom: 16px;
    }
    .card input:focus { border-color: #1a1a1a; }

    .btn {
      width: 100%; padding: 12px; background: #1a1a1a; color: #fff; border: none;
      border-radius: 8px; font-size: 1rem; font-family: inherit; cursor: pointer;
      font-weight: 500; transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.8; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .status {
      font-size: 0.95rem; margin-bottom: 24px; padding: 10px 24px;
      border-radius: 100px; display: inline-block; font-weight: 400;
    }
    .success { background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }
    .error-pill { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }

    .success-text { font-size: 1.05rem; color: #555; margin: 20px 0; line-height: 1.6; }
    .footer { color: #bbb; font-size: 0.8rem; letter-spacing: 0.05em; margin-top: 40px; }
    .footer a { color: #999; text-decoration: none; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <img src="/static/hntic-logo.png" alt="HNTIC" class="logo-img">
    <h1>Otto</h1>
    <p class="byline">by HNTIC</p>

    <!-- Email form -->
    <div id="form-section">
      <p class="tagline">Entre ton email pour recevoir un nouveau lien de connexion.</p>
      <div class="card">
        <label for="email">Ton adresse email</label>
        <input type="email" id="email" placeholder="nom@entreprise.com" autocomplete="email">
        <button class="btn" id="submit-btn" onclick="requestLink()">Envoyer</button>
      </div>
    </div>

    <!-- Success -->
    <div id="success-section" class="hidden">
      <div class="status success">Lien g&eacute;n&eacute;r&eacute;</div>
      <p class="success-text">Clique sur le lien ci-dessous pour reconnecter ton WhatsApp :</p>
      <div class="card">
        <a id="onboard-link" href="#" style="word-break:break-all;color:#1a6ed8;font-size:0.95rem"></a>
      </div>
    </div>

    <!-- Error -->
    <div id="error-section" class="hidden">
      <div class="status error-pill" id="error-msg">Erreur</div>
      <p class="success-text">
        <button class="btn" onclick="document.getElementById('error-section').classList.add('hidden');document.getElementById('form-section').classList.remove('hidden');">R&eacute;essayer</button>
      </p>
    </div>

    <div class="footer"><p><a href="https://hntic.fr">HNTIC</a></p></div>
  </div>

  <script>
    async function requestLink() {
      const email = document.getElementById('email').value.trim();
      if (!email || !email.includes('@')) {
        alert('Entre une adresse email valide');
        return;
      }

      document.getElementById('submit-btn').disabled = true;
      document.getElementById('submit-btn').textContent = 'Envoi en cours...';

      try {
        const res = await fetch('/api/reconnect', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email }),
        });

        const data = await res.json();

        if (res.ok && data.onboardUrl) {
          document.getElementById('form-section').classList.add('hidden');
          document.getElementById('success-section').classList.remove('hidden');
          const link = document.getElementById('onboard-link');
          link.href = data.onboardUrl;
          link.textContent = data.onboardUrl;
        } else {
          document.getElementById('form-section').classList.add('hidden');
          document.getElementById('error-section').classList.remove('hidden');
          document.getElementById('error-msg').textContent = data.error || 'Erreur inconnue';
        }
      } catch {
        document.getElementById('form-section').classList.add('hidden');
        document.getElementById('error-section').classList.remove('hidden');
        document.getElementById('error-msg').textContent = 'Erreur de connexion';
      }

      document.getElementById('submit-btn').disabled = false;
      document.getElementById('submit-btn').textContent = 'Envoyer';
    }

    document.getElementById('email').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') requestLink();
    });
  </script>
</body>
</html>
